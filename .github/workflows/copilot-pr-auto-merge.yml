name: Copilot PR — Ready & Auto-merge

on:
  pull_request:
    types: [opened, reopened, converted_to_ready]
    branches:
      - main

jobs:
  enable-auto-merge:
    if: startsWith(github.head_ref, 'copilot/')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Mark PR ready for review
        run: gh pr ready ${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Enable auto-merge
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
