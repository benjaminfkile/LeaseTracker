name: Merge on Approval

on:
  pull_request_review:
    types: [submitted]

jobs:
  merge-and-advance:
    if: |
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Promote draft if needed, then merge
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          # Promote draft to ready if still a draft
          DRAFT=$(gh pr view $PR --repo $REPO --json isDraft --jq '.isDraft')
          if [ "$DRAFT" = "true" ]; then
            echo "PR is a draft — promoting to ready for review"
            gh pr ready $PR --repo $REPO
          fi

          echo "Merging PR #$PR"
          gh pr merge $PR --squash --delete-branch --repo $REPO


      - name: Checkout main (to read issue queue)
        if: steps.merge.conclusion == 'success'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Close current and advance queue
        if: steps.merge.conclusion == 'success'
        uses: actions/github-script@v7
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const queue = JSON.parse(fs.readFileSync('.github/issue-queue.json', 'utf8')).queue;

            // Fetch all open issues (paginated, oldest-first)
            let openIssues = [];
            for (let page = 1; ; page++) {
              const { data } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
                page,
                direction: 'asc',
              });
              openIssues = openIssues.concat(data);
              if (data.length < 100) break;
            }

            const openMap = Object.fromEntries(openIssues.map(i => [i.number, i]));

            // Close the first open+assigned issue in queue order (the one just completed)
            for (const num of queue) {
              const issue = openMap[num];
              if (!issue) continue;
              if (issue.assignees && issue.assignees.length > 0) {
                console.log(`Closing issue #${num}: ${issue.title}`);
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  state: 'closed',
                });
                delete openMap[num];
                break;
              }
            }

            // Find the next open+unassigned issue in queue order and assign it
            for (const num of queue) {
              const issue = openMap[num];
              if (!issue) continue;
              if (issue.assignees && issue.assignees.length > 0) continue;

              const isManual = issue.labels.some(l => l.name === 'manual');
              console.log(`Next issue: #${num} "${issue.title}" (manual=${isManual})`);

              if (isManual) {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  assignees: [context.repo.owner],
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  body: '👋 **Manual task** — this requires human action and cannot be completed by the coding agent. Complete the steps above, then close this issue to advance the queue.',
                });
              } else {
                execSync(
                  `gh issue edit ${num} --add-assignee @copilot --repo ${context.repo.owner}/${context.repo.repo}`,
                  { env: { ...process.env, GH_TOKEN: process.env.GH_PAT }, stdio: 'inherit' }
                );
              }
              return;
            }

            console.log('No more open issues in queue — all done!');
